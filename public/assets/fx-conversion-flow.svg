<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <style>
    .bg { fill: var(--color-terminal-bg, #181a20); }
    .box { fill: none; stroke: var(--color-terminal-cyan, #18ffff); stroke-width: 1.5; rx: 8; ry: 8; }
    .box-alt { fill: none; stroke: var(--color-terminal-green, #00e676); stroke-width: 1.5; rx: 8; ry: 8; }
    .box-accent { fill: none; stroke: var(--color-terminal-yellow, #ffd740); stroke-width: 1.5; rx: 8; ry: 8; }
    .label { fill: var(--color-terminal-text, #e0e0e0); font-family: 'JetBrains Mono', monospace; font-size: 12px; text-anchor: middle; dominant-baseline: central; }
    .label-sm { fill: var(--color-terminal-text-dim, #888); font-family: 'JetBrains Mono', monospace; font-size: 10px; text-anchor: middle; dominant-baseline: central; }
    .label-lg { fill: var(--color-terminal-text, #e0e0e0); font-family: 'JetBrains Mono', monospace; font-size: 13px; text-anchor: middle; dominant-baseline: central; font-weight: bold; }
    .arrow { stroke: var(--color-terminal-text-dim, #888); stroke-width: 1.2; fill: none; marker-end: url(#arrowhead); }
    .arrow-fx { stroke: var(--color-terminal-yellow, #ffd740); stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-yellow); }
    .divider { stroke: var(--color-terminal-text-dim, #888); stroke-width: 0.5; stroke-dasharray: 6 4; }
    .section-label { fill: var(--color-terminal-text-dim, #888); font-family: 'JetBrains Mono', monospace; font-size: 10px; text-anchor: start; dominant-baseline: central; font-style: italic; }
    .currency { fill: var(--color-terminal-green, #00e676); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-anchor: middle; dominant-baseline: central; font-weight: bold; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="var(--color-terminal-text-dim, #888)" stroke-width="1.2" />
    </marker>
    <marker id="arrowhead-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="var(--color-terminal-yellow, #ffd740)" stroke-width="1.2" />
    </marker>
  </defs>

  <rect width="800" height="420" class="bg" rx="12" />

  <!-- Section: Markets -->
  <text x="30" y="30" class="section-label">MARKETS (LOCAL CURRENCY)</text>
  <line x1="20" y1="40" x2="250" y2="40" class="divider" />

  <!-- NYSE Market -->
  <rect x="40" y="60" width="170" height="55" class="box" />
  <text x="125" y="78" class="label">NYSE</text>
  <text x="125" y="98" class="currency">USD $50,000</text>

  <!-- LSE Market -->
  <rect x="40" y="135" width="170" height="55" class="box" />
  <text x="125" y="153" class="label">LSE</text>
  <text x="125" y="173" class="currency">GBP £30,000</text>

  <!-- TSE Market -->
  <rect x="40" y="210" width="170" height="55" class="box" />
  <text x="125" y="228" class="label">TSE</text>
  <text x="125" y="248" class="currency">JPY ¥5,000,000</text>

  <!-- Section: FX Conversion Layer -->
  <text x="290" y="30" class="section-label">FX CONVERSION</text>
  <line x1="280" y1="40" x2="530" y2="40" class="divider" />

  <!-- FXRateProvider -->
  <rect x="300" y="60" width="200" height="70" class="box-accent" />
  <text x="400" y="82" class="label">FXRateProvider</text>
  <text x="400" y="100" class="label-sm">get_rate(from, to, date)</text>
  <text x="400" y="115" class="label-sm">pluggable interface</text>

  <!-- Rate examples -->
  <rect x="300" y="150" width="200" height="80" class="box" />
  <text x="400" y="170" class="label-sm">USD/EUR → 0.92</text>
  <text x="400" y="188" class="label-sm">GBP/EUR → 1.17</text>
  <text x="400" y="206" class="label-sm">JPY/EUR → 0.006</text>
  <text x="400" y="220" class="label-sm">+ inverse rates</text>

  <!-- Arrows from markets to FX -->
  <line x1="210" y1="87" x2="298" y2="87" class="arrow" />
  <line x1="210" y1="162" x2="298" y2="105" class="arrow" />
  <line x1="210" y1="237" x2="298" y2="120" class="arrow" />

  <!-- FX conversion arrows -->
  <line x1="400" y1="130" x2="400" y2="148" class="arrow-fx" />

  <!-- Section: Context API -->
  <text x="290" y="260" class="section-label">CONTEXT API</text>
  <line x1="280" y1="270" x2="530" y2="270" class="divider" />

  <rect x="300" y="285" width="200" height="80" class="box-alt" />
  <text x="400" y="305" class="label">context</text>
  <text x="400" y="325" class="label-sm">get_fx_rate()</text>
  <text x="400" y="340" class="label-sm">convert_to_base()</text>
  <text x="400" y="355" class="label-sm">get_portfolio_value()</text>

  <line x1="400" y1="230" x2="400" y2="283" class="arrow" />

  <!-- Section: Portfolio Output -->
  <text x="580" y="30" class="section-label">PORTFOLIO</text>
  <line x1="570" y1="40" x2="780" y2="40" class="divider" />

  <!-- Base Currency Portfolio -->
  <rect x="580" y="60" width="180" height="120" class="box-alt" />
  <text x="670" y="82" class="label-lg">Base Currency</text>
  <text x="670" y="105" class="currency">EUR</text>
  <text x="670" y="130" class="label-sm">Total: €126,000</text>
  <text x="670" y="148" class="label-sm">Unified P&amp;L</text>
  <text x="670" y="163" class="label-sm">Accurate Returns</text>

  <line x1="500" y1="95" x2="578" y2="110" class="arrow-fx" />
  <line x1="500" y1="190" x2="578" y2="140" class="arrow-fx" />

  <!-- Strategy box -->
  <rect x="580" y="210" width="180" height="80" class="box" />
  <text x="670" y="232" class="label">Strategy</text>
  <text x="670" y="255" class="label-sm">Trades in local</text>
  <text x="670" y="270" class="label-sm">currency, reports</text>
  <text x="670" y="285" class="label-sm">in base currency</text>

  <line x1="500" y1="325" x2="578" y2="260" class="arrow" />

  <!-- StaticFXRateProvider label -->
  <rect x="580" y="320" width="180" height="55" class="box-accent" />
  <text x="670" y="340" class="label-sm">StaticFXRateProvider</text>
  <text x="670" y="358" class="label-sm">built-in default</text>
</svg>
